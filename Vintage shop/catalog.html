<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINTAGE SHOP - Каталог</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .catalog-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 20px;
        }
        
        .home-link {
            display: inline-block;
            padding: 8px 20px;
            background: rgb(10, 1, 5);
            color: white;
            border: 2px solid rgb(249, 30, 165);
            border-radius: 30px;
            text-decoration: none;
            font-family: fantasy;
            transition: all 0.3s;
        }
        
        .home-link:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgb(249, 30, 165);
        }
        
        .filters-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgb(242, 215, 219);
            border-radius: 15px;
            border: 2px solid rgb(249, 30, 165);
            box-shadow: 0 10px 30px rgba(249, 30, 165, 0.2);
        }
        
        .sort-select {
            padding: 10px 20px;
            border: 2px solid rgb(249, 30, 165);
            border-radius: 30px;
            font-family: fantasy;
            font-size: 16px;
            background: white;
            cursor: pointer;
            color: rgb(249, 30, 165);
        }
        
        .sort-select:hover {
            box-shadow: 0 0 15px rgb(249, 30, 165);
        }
        
        .category-title {
            font-family: fantasy;
            font-size: 28px;
            color: rgb(249, 30, 165);
            margin: 0;
            text-shadow: 0 0 10px rgb(249, 30, 165);
            -webkit-text-stroke: 0.5px black;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        
        .product-card {
            background: rgb(242, 215, 219);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid rgb(249, 30, 165);
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(249, 30, 165, 0.1);
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(249, 30, 165, 0.3);
        }
        
        .product-image {
            width: 100%;
            height: 200px;
            overflow: hidden;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 3px solid rgb(249, 30, 165);
        }
        
        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .product-name {
            font-family: fantasy;
            font-size: 18px;
            color: black;
            margin: 10px 0;
            text-shadow: 0 0 5px rgb(249, 30, 165);
            -webkit-text-stroke: 0.5px black;
        }
        
        .product-price {
            font-size: 22px;
            font-weight: bold;
            color: rgb(249, 30, 165);
            margin: 10px 0;
            text-shadow: 0 0 5px rgb(249, 30, 165);
            -webkit-text-stroke: 0.5px black;
        }
        
        .product-rating {
            color: #ffc107;
            margin: 10px 0;
            text-shadow: 0 0 2px black;
        }
        
        .new-badge {
            background: rgb(249, 30, 165);
            color: white;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 10px;
            text-shadow: 0 0 5px rgb(249, 30, 165);
            -webkit-text-stroke: 0.5px black;
        }
        
        .add-to-cart-btn {
            width: 100%;
            padding: 10px;
            background: rgb(10, 1, 5);
            color: white;
            border: 2px solid rgb(249, 30, 165);
            border-radius: 30px;
            cursor: pointer;
            font-family: fantasy;
            margin-top: 10px;
            transition: all 0.3s;
            text-shadow: 0 0 10px rgb(249, 30, 165);
        }
        
        .add-to-cart-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgb(249, 30, 165);
        }
        
        .details-btn {
            width: 100%;
            padding: 10px;
            background: rgb(10, 1, 5);
            color: white;
            border: 2px solid rgb(249, 30, 165);
            border-radius: 30px;
            cursor: pointer;
            font-family: fantasy;
            margin-top: 5px;
            transition: all 0.3s;
            text-align: center;
            display: block;
            text-decoration: none;
            text-shadow: 0 0 10px rgb(249, 30, 165);
        }
        
        .details-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgb(249, 30, 165);
        }
        
        .admin-actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }
        
        .edit-btn, .delete-btn {
            flex: 1;
            padding: 8px;
            font-size: 12px;
            border-radius: 20px;
            cursor: pointer;
            font-family: fantasy;
            border: none;
            transition: all 0.3s;
        }
        
        .edit-btn {
            background: #4CAF50;
            color: white;
        }
        
        .delete-btn {
            background: #f44336;
            color: white;
        }
        
        .edit-btn:hover, .delete-btn:hover {
            transform: scale(1.02);
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgb(249, 30, 165);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-family: fantasy;
            z-index: 3000;
            animation: slideInRight 0.3s ease;
            border: 2px solid white;
            box-shadow: 0 5px 20px rgba(249, 30, 165, 0.3);
        }
        
        /* Модальное окно для выбора размера */
        .size-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 4000;
            justify-content: center;
            align-items: center;
        }
        
        .size-modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 3px solid rgb(249, 30, 165);
            animation: fadeIn 0.3s ease;
        }
        
        .size-modal-content h3 {
            font-family: fantasy;
            color: rgb(249, 30, 165);
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .size-modal-content select {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid rgb(249, 30, 165);
            border-radius: 10px;
            font-family: fantasy;
            font-size: 16px;
        }
        
        .size-modal-content button {
            padding: 12px 30px;
            margin: 5px;
            border: 2px solid rgb(249, 30, 165);
            border-radius: 30px;
            font-family: fantasy;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .confirm-size-btn {
            background: rgb(249, 30, 165);
            color: white;
        }
        
        .confirm-size-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgb(249, 30, 165);
        }
        
        .cancel-size-btn {
            background: white;
            color: rgb(249, 30, 165);
        }
        
        .cancel-size-btn:hover {
            background: #f0f0f0;
        }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Стили для шапки */
        .site-header {
            background-image: url('Товары/фон.jpg');
            background-size: cover;
            background-position: center;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
        }
        
        .site-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
        }
        
        .logo-text {
            font-family: fantasy;
            font-size: 48px;
            color: white;
            text-shadow: 0 0 20px rgb(249, 30, 165), 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 4px;
            position: relative;
            z-index: 1;
        }
        
        .main-nav {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        nav {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }
        
        .menu-item {
            position: relative;
        }
        
        .menu-btn {
            background: white;
            border: 2px solid rgb(249, 30, 165);
            border-radius: 30px;
            color: rgb(249, 30, 165);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            padding: 10px 20px;
            transition: all 0.3s;
            font-family: fantasy;
        }
        
        .menu-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgb(249, 30, 165);
        }
        
        .submenu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            min-width: 200px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(249, 30, 165, 0.3);
            overflow: hidden;
            z-index: 1000;
            border: 2px solid rgb(249, 30, 165);
        }
        
        .menu-item:hover .submenu {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        .submenu a {
            display: block;
            padding: 12px 20px;
            color: rgb(249, 30, 165);
            text-decoration: none;
            transition: all 0.3s;
            border-left: 3px solid transparent;
            font-family: fantasy;
            background: white;
        }
        
        .submenu a:hover {
            background: rgb(249, 30, 165);
            border-left-color: white;
            padding-left: 25px;
            color: white;
        }
        
        .right {
            display: flex;
            gap: 15px;
        }
        
        .auth-btn, .cart-btn {
            padding: 10px 25px;
            border: 2px solid rgb(249, 30, 165);
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-family: fantasy;
            font-size: 16px;
            background: white;
            color: rgb(249, 30, 165);
        }
        
        .auth-btn:hover, .cart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgb(249, 30, 165);
        }
        
        .count {
            background: rgb(249, 30, 165);
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            margin-left: 8px;
            font-size: 12px;
        }
    </style>

            { id: 20, name: "Сумка Betty Boop", price: 15000, category: "Сумки", subcategory: "Сумки и Косметички", image: "Товары/сумка 1.jpg", rating: 4.7, isNew: false, description: "Сумка с изображением Betty Boop.", specs: ["Хобо", "Полиэстер", "Розовый"], hasSize: false },
            { id: 21, name: "LV x Takashi Murakami", price: 80000, category: "Сумки", subcategory: "Сумки и Косметички", image: "Товары/сумка 2.jpg", rating: 5.0, isNew: true, description: "Культовая сумка Speedy 30.", specs: ["Саквояж", "Monogram Multicolore", "Белый"], hasSize: false },
            { id: 22, name: "Косметичка A Bathing Ape", price: 6000, category: "Сумки", subcategory: "Сумки и Косметички", image: "Товары/косметичка 1.jpg", rating: 4.5, isNew: false, description: "Косметичка с принтом BAPE.", specs: ["Текстиль", "Розовый"], hasSize: false },
            { id: 23, name: "Набор косметичек Ed Hardy", price: 5000, category: "Сумки", subcategory: "Сумки и Косметички", image: "Товары/косметичка 2.jpg", rating: 4.7, isNew: false, description: "Набор из двух косметичек.", specs: ["2 шт", "Черный, розовый"], hasSize: false },
            { id: 24, name: "Брелок PlayBoy", price: 2499, category: "Сумки", subcategory: "Обвесы и брелоки", image: "Товары/брелок 1.jpg", rating: 4.7, isNew: false, description: "Винтажный брелок в форме сердца.", specs: ["Металл", "Розовый"], hasSize: false },
            { id: 25, name: "DIOR гавайский браслет", price: 15900, category: "Украшения", subcategory: "Кольца и браслеты", image: "Товары/браслет 2.jpg", rating: 4.9, isNew: true, description: "Винтажный браслет Dior.", specs: ["Серебро", "Розовый"], hasSize: true, sizeType: "bracelet" },
            { id: 26, name: "Набор колец Vivienne Westwood", price: 17900, category: "Украшения", subcategory: "Кольца и браслеты", image: "Товары/кольцо 2.jpg", rating: 5.0, isNew: true, description: "Комплект из 6 колец.", specs: ["Серебро", "6 шт"], hasSize: true, sizeType: "ring" },
            { id: 27, name: "Подвеска Vivienne Westwood", price: 15000, category: "Украшения", subcategory: "Ожерелья и подвески", image: "Товары/ожерелье 1.jpg", rating: 4.8, isNew: false, description: "Подвеска в виде клубники.", specs: ["Серебро", "Красный"], hasSize: false },
            { id: 28, name: "Подвеска Ed Hardy", price: 8000, category: "Украшения", subcategory: "Ожерелья и подвески", image: "Товары/подвеска.jpg", rating: 4.7, isNew: false, description: "Кулон в стиле тату-арт.", specs: ["Серебро", "Розовый"], hasSize: false },
            { id: 29, name: "Очки DIOR", price: 25000, category: "Украшения", subcategory: "Очки", image: "Товары/очки 1.jpg", rating: 4.8, isNew: false, description: "Солнцезащитные очки Dior.", specs: ["Пластик", "Белый"], hasSize: false },
            { id: 30, name: "Очки DIOR", price: 25000, category: "Украшения", subcategory: "Очки", image: "Товары/очки 2.jpg", rating: 4.8, isNew: false, description: "Винтажные очки Dior.", specs: ["Пластик", "Розовый"], hasSize: false },
            { id: 31, name: "Часы Juicy Couture", price: 20000, category: "Украшения", subcategory: "Часы", image: "Товары/часы.jpg", rating: 4.9, isNew: true, description: "Винтажные часы с сердечком.", specs: ["Серебро", "Золотой"], hasSize: true, sizeType: "bracelet" }
        ];
        
        // Сохраняем товары в localStorage
        if (!localStorage.getItem('products')) {
            localStorage.setItem('products', JSON.stringify(productsData));
        }
        
        let currentProducts = [];
        let currentSort = 'default';
        let currentCategory = null;
        let currentSubcategory = null;
        let pendingProduct = null; // Для хранения товара, ожидающего выбора размера
        
        const sizeOptionsMap = {
            clothes: ['XS (40-42)', 'S (42-44)', 'M (44-46)', 'L (46-48)', 'XL (48-50)'],
            shoes: ['35', '36', '37', '38', '39', '40', '41'],
            bracelet: ['15-16 см', '17-18 см', '19-20 см', '21-22 см'],
            ring: ['15', '16', '17', '18', '19', '20']
        };
        
        function loadProducts() {
            const saved = localStorage.getItem('products');
            if (saved) {
                currentProducts = JSON.parse(saved);
            } else {
                currentProducts = productsData;
            }
            return currentProducts;
        }
        
        function getSizeOptionsForProduct(product) {
            if (product.sizeType === 'clothes') return sizeOptionsMap.clothes;
            if (product.sizeType === 'shoes') return sizeOptionsMap.shoes;
            if (product.sizeType === 'bracelet') return sizeOptionsMap.bracelet;
            if (product.sizeType === 'ring') return sizeOptionsMap.ring;
            return null;
        }
        
        function openSizeModal(product) {
            pendingProduct = product;
            const sizeOptions = getSizeOptionsForProduct(product);
            const select = document.getElementById('modalSizeSelect');
            select.innerHTML = '<option value="">-- Выберите размер --</option>' + 
                sizeOptions.map(size => `<option value="${size}">${size}</option>`).join('');
            document.getElementById('sizeModal').style.display = 'flex';
        }
        
        function closeSizeModal() {
            document.getElementById('sizeModal').style.display = 'none';
            pendingProduct = null;
        }
        
        function confirmSizeSelection() {
            const select = document.getElementById('modalSizeSelect');
            const selectedSize = select.value;
            
            if (!selectedSize) {
                showNotification('Пожалуйста, выберите размер!', 'warning');
                return;
            }
            
            if (pendingProduct) {
                addToCart(pendingProduct.id, pendingProduct.name, pendingProduct.price, pendingProduct.image, selectedSize);
                closeSizeModal();
            }
        }
        
        function displayProducts() {
            let filtered = [...currentProducts];
            
            if (currentCategory) {
                filtered = filtered.filter(p => p.category === currentCategory);
            }
            if (currentSubcategory) {
                filtered = filtered.filter(p => p.subcategory === currentSubcategory);
            }
            
            if (currentSort === 'price_asc') {
                filtered.sort((a, b) => a.price - b.price);
            } else if (currentSort === 'price_desc') {
                filtered.sort((a, b) => b.price - a.price);
            } else if (currentSort === 'rating_desc') {
                filtered.sort((a, b) => (b.rating || 0) - (a.rating || 0));
            } else if (currentSort === 'newest') {
                filtered.sort((a, b) => (b.isNew ? 1 : 0) - (a.isNew ? 1 : 0));
            }
            
            const container = document.getElementById('productsContainer');
            const user = localStorage.getItem('user');
            const isAdmin = user ? JSON.parse(user).isAdmin : false;
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 50px; font-family: fantasy; color: rgb(249, 30, 165);">Товары не найдены</div>';
                return;
            }
            
            container.innerHTML = filtered.map(product => {
                const hasSize = product.hasSize !== false && getSizeOptionsForProduct(product) !== null;
                const addToCartHandler = hasSize ? 
                    `onclick="openSizeModal(${JSON.stringify(product).replace(/"/g, '&quot;')})"` : 
                    `onclick="addToCart(${product.id}, '${product.name.replace(/'/g, "\\'")}', ${product.price}, '${product.image}')"`;
                
                return `
                    <div class="product-card">
                        ${product.isNew ? '<div class="new-badge">НОВИНКА</div>' : ''}
                        <div class="product-image">
                            <img src="${product.image}" alt="${product.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect width=%22200%22 height=%22200%22 fill=%22%23f0b2e3%22/><text x=%2270%22 y=%22110%22 fill=%22%23f11968%22>${product.name[0]}</text></svg>'">
                        </div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-rating">${'★'.repeat(Math.floor(product.rating || 4))}${'☆'.repeat(5 - Math.floor(product.rating || 4))} ${product.rating || 4}</div>
                        <div class="product-price">${product.price.toLocaleString()} ₽</div>
                        <button class="add-to-cart-btn" ${addToCartHandler}>В корзину</button>
                        <a href="product.html?id=${product.id}" class="details-btn">Подробнее</a>
                        ${isAdmin ? `
                            <div class="admin-actions">
                                <button class="edit-btn" onclick="editProduct(${product.id})">✏️ Редактировать</button>
                                <button class="delete-btn" onclick="deleteProduct(${product.id})">🗑️ Удалить</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }
        
        function addToCart(id, name, price, image, size = null) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            // Проверяем, есть ли уже такой товар с таким же размером
            const existing = cart.find(item => item.id === id && item.size === size);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ 
                    id, 
                    name, 
                    price, 
                    image, 
                    quantity: 1,
                    size: size || null,
                    hasSize: !!size
                });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            showNotification('Товар добавлен в корзину!');
        }
        
        function sortProducts() {
            currentSort = document.getElementById('sortSelect').value;
            displayProducts();
        }
        
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            const cartCounts = document.querySelectorAll('#cartCount');
            cartCounts.forEach(el => { if (el) el.textContent = count; });
        }
        
        function showNotification(msg, type = 'success') {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = msg;
            if (type === 'warning') {
                notif.style.background = '#ff9800';
            }
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }
        
        function editProduct(id) {
            localStorage.setItem('editProductId', id);
            window.location.href = 'admin.html';
        }
        
        function deleteProduct(id) {
            if (confirm('Удалить товар?')) {
                let products = JSON.parse(localStorage.getItem('products')) || [];
                products = products.filter(p => p.id !== id);
                localStorage.setItem('products', JSON.stringify(products));
                currentProducts = products;
                displayProducts();
                showNotification('Товар удален');
            }
        }
        
        function checkAuthAndRedirect() {
            const user = localStorage.getItem('user');
            if (user) {
                window.location.href = 'account.html';
            } else {
                window.location.href = 'login.html';
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
            
            const urlParams = new URLSearchParams(window.location.search);
            currentCategory = urlParams.get('category');
            currentSubcategory = urlParams.get('subcategory');
            
            if (currentCategory && currentSubcategory) {
                document.getElementById('categoryTitle').textContent = `${currentCategory} / ${currentSubcategory}`;
            } else {
                document.getElementById('categoryTitle').textContent = 'Все товары';
            }
            
            const user = localStorage.getItem('user');
            const isAdmin = user ? JSON.parse(user).isAdmin : false;
            if (isAdmin) {
                document.getElementById('adminAddBtn').style.display = 'block';
            }
            
            displayProducts();
            updateCartCount();
            
            const userData = localStorage.getItem('user');
            const authBtn = document.getElementById('authBtn');
            if (userData) {
                const user = JSON.parse(userData);
                authBtn.innerHTML = `👤 ${user.email.split('@')[0]}`;
            }
        });
    </script>
</body>
</html>
